<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OWNED — Intake</title>
  <meta name="description" content="The Holdings. Preserved in perpetuity.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/intake.css">

  <script src="js/owner.js"></script>
  <script>
    // Repeat-visit guard — runs before any UI renders
    if (window.OWNED) window.OWNED.redirectIfEnrolled();
  </script>
</head>
<body class="intake-body">

  <!-- Fixed corner branding -->
  <div class="intake-brand">
    <svg class="steam-logo" viewBox="0 0 64 64" aria-label="Steam">
      <circle cx="32" cy="32" r="30" fill="currentColor"/>
      <circle cx="32" cy="26" r="9" fill="none" stroke="rgba(14,20,27,0.9)" stroke-width="3.5"/>
      <path d="M 32 35 L 30 47 C 29.5 49, 27.5 49, 27 47 L 25 40 C 24.5 38, 26 37, 28 38 L 32 35"
            fill="none" stroke="rgba(14,20,27,0.9)" stroke-width="3.5" stroke-linecap="round"/>
      <path d="M 16 42 C 18 38, 23 37, 26 39"
            fill="none" stroke="rgba(14,20,27,0.6)" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <span>STEAM<sup>®</sup></span>
  </div>
  <div class="intake-ver mono">VER: 4.15</div>
  <div class="intake-status mono">ARCHIVE_NODE_7734 | SYS_STATUS: ACTIVE</div>

  <!-- 4-pointed sparkle -->
  <div class="sparkle" aria-hidden="true">
    <svg viewBox="0 0 28 28" width="28" height="28" fill="currentColor">
      <path d="M14 0 L15.8 12.2 L28 14 L15.8 15.8 L14 28 L12.2 15.8 L0 14 L12.2 12.2 Z"/>
    </svg>
  </div>

  <main class="intake">

    <!-- Stage 1 — Name prompt -->
    <section class="intake__stage intake__stage--name is-active" data-stage="name">
      <p class="intake__tagline serif-italic">The Holdings. Preserved in perpetuity.</p>

      <form class="intake__form" id="intake-form" autocomplete="off">
        <input type="text" id="owner-name" name="owner" maxlength="60"
               placeholder="STATE YOUR NAME FOR THE RECORD."
               spellcheck="false" autofocus required aria-label="Your name">
        <button type="submit" class="btn-ghost intake__submit">Proceed</button>
      </form>
      <p class="intake__hint mono">Press enter when ready.</p>
    </section>

    <!-- Stage 2 — Scan -->
    <section class="intake__stage intake__stage--scan" data-stage="scan">
      <div class="scan-panel" id="scan-panel">
        <!-- Video (camera path) -->
        <video class="scan-panel__video" id="scan-video" autoplay playsinline muted></video>

        <!-- Silhouette placeholder (fallback path) -->
        <div class="scan-panel__silhouette" id="scan-silhouette" aria-hidden="true">
          <svg viewBox="0 0 200 240" class="silhouette" role="img" aria-label="Unphotographed owner">
            <defs>
              <radialGradient id="silGlow" cx="50%" cy="42%" r="55%">
                <stop offset="0%" stop-color="#66c0f4" stop-opacity="0.28"/>
                <stop offset="100%" stop-color="#66c0f4" stop-opacity="0"/>
              </radialGradient>
            </defs>
            <rect x="0" y="0" width="200" height="240" fill="#1b2838"/>
            <circle cx="100" cy="105" r="90" fill="url(#silGlow)"/>
            <!-- Hooded figure: cloak + shoulders + head silhouette -->
            <path d="M 100 40 C 72 40, 58 62, 60 92 L 60 110 C 40 122, 28 148, 25 192 L 25 240 L 175 240 L 175 192 C 172 148, 160 122, 140 110 L 140 92 C 142 62, 128 40, 100 40 Z"
                  fill="#0e141b" stroke="#8899a6" stroke-width="1.2" opacity="0.9"/>
            <!-- Inner shadow / face void -->
            <ellipse cx="100" cy="96" rx="24" ry="30" fill="#0e141b" stroke="#8899a6" stroke-width="0.6"/>
            <!-- Hood rim -->
            <path d="M 60 92 Q 100 68, 140 92" fill="none" stroke="#8899a6" stroke-width="0.8" opacity="0.6"/>
            <!-- Cross-hatch detail on cloak shoulders -->
            <g stroke="#8899a6" stroke-width="0.4" opacity="0.35">
              <line x1="40" y1="150" x2="70" y2="180"/>
              <line x1="45" y1="165" x2="70" y2="195"/>
              <line x1="50" y1="180" x2="70" y2="210"/>
              <line x1="160" y1="150" x2="130" y2="180"/>
              <line x1="155" y1="165" x2="130" y2="195"/>
              <line x1="150" y1="180" x2="130" y2="210"/>
            </g>
          </svg>
        </div>

        <!-- Scan line overlay -->
        <div class="scan-line" id="scan-line"></div>

        <!-- Corner brackets (archival frame) -->
        <span class="scan-corner scan-corner--tl"></span>
        <span class="scan-corner scan-corner--tr"></span>
        <span class="scan-corner scan-corner--bl"></span>
        <span class="scan-corner scan-corner--br"></span>

        <!-- Microcopy blocks -->
        <div class="scan-microcopy" id="scan-microcopy">
          <div class="scan-microcopy__line" data-line="0"></div>
          <div class="scan-microcopy__line" data-line="1"></div>
          <div class="scan-microcopy__line" data-line="2"></div>
        </div>
      </div>

      <button type="button" class="scan-skip link-quiet" id="scan-skip">› Skip camera</button>
      <p class="scan-status mono" id="scan-status">Awaiting permission.</p>
    </section>

    <!-- Vault door transition (covers screen on completion) -->
    <div class="vault-door" id="vault-door" aria-hidden="true">
      <div class="vault-door__panel vault-door__panel--left"></div>
      <div class="vault-door__panel vault-door__panel--right"></div>
      <div class="vault-door__seam"></div>
    </div>

  </main>

  <script src="js/intake.js"></script>
</body>
</html>
